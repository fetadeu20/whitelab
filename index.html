<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Lab</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>

        <div class="logo-area">
            <img src="assets/logo.png" alt="Logo White Lab">
            <h1>WHITE <span>LAB</span></h1>
        </div>

        <nav>
            <a href="#">Início</a>
            <a href="#">Produtos</a>
            <a href="#">Contato</a>
        </nav>

    </header>

    <section class="banner">
        <h2>Performance no limite</h2>
    </section>

    <section class="produtos">

        <div class="produto">
            <img src="img/prod1.png" alt="">
            <h3>Whey Protein</h3>
            <p>Suplemento proteico</p>
            <button onclick="comprar('Whey Protein')">Comprar</button>
        </div>

        <div class="produto">
            <img src="img/prod2.png" alt="">
            <h3>Creatina</h3>
            <p>Força e explosão</p>
            <button onclick="comprar('Creatina')">Comprar</button>
        </div>

        <div class="produto">
            <img src="img/prod3.png" alt="">
            <h3>Pré-Treino</h3>
            <p>Energia máxima</p>
            <button onclick="comprar('Pré-Treino')">Comprar</button>
        </div>

        <div class="produto">
            <img src="img/prod4.png" alt="">
            <h3>Barra Proteica</h3>
            <p>Snack saudável</p>
            <button onclick="comprar('Barra Proteica')">Comprar</button>
        </div>

        <div class="produto">
            <img src="img/prod5.png" alt="">
            <h3>BCAA</h3>
            <p>Recuperação muscular</p>
            <button onclick="comprar('BCAA')">Comprar</button>
        </div>

    </section>

    <footer>
        <p>© 2025 White Lab - Todos os direitos reservados</p>
    </footer>

    <script src="script.js"></script>

</body>

</html>
